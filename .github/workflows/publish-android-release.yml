name: publish-release-assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to rebuild or publish
        required: true
        type: string

permissions:
  actions: write
  contents: write

jobs:
  prepare-release:
    outputs:
      is_prerelease: ${{ steps.resolve-release.outputs.is_prerelease }}
      release_name: ${{ steps.resolve-release.outputs.release_name }}
      release_tag: ${{ steps.resolve-release.outputs.release_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: resolve-release
        env:
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          release_tag="$INPUT_RELEASE_TAG"
          if [ -z "$release_tag" ] && [ "$EVENT_REF_TYPE" = "tag" ]; then
            release_tag="$EVENT_REF_NAME"
          fi
          if [ -z "$release_tag" ]; then
            echo "Missing release tag." >&2
            exit 1
          fi
          release_name="VocaPort $release_tag"
          if printf '%s' "$release_tag" | grep -Eq -- '-(alpha|beta|rc)([.-][0-9]+)?$|-preview([.-][0-9]+)?$'; then
            is_prerelease="true"
          else
            is_prerelease="false"
          fi
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.resolve-release.outputs.is_prerelease }}
          RELEASE_NAME: ${{ steps.resolve-release.outputs.release_name }}
          RELEASE_TAG: ${{ steps.resolve-release.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          args=(
            release
            create
            "$RELEASE_TAG"
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$RELEASE_NAME"
            --notes "Automated release for $RELEASE_TAG. Release assets will be uploaded after the build jobs finish."
          )

          if [ "$IS_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"

  build-android:
    needs: prepare-release
    runs-on: macos-15
    env:
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android command-line tools
        run: |
          brew install --cask android-commandlinetools
          brew_prefix="$(brew --prefix)"
          echo "$brew_prefix/share/android-commandlinetools/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          mkdir -p "$ANDROID_HOME"
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "cmdline-tools;latest" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "ndk;29.0.14206865"
          ndk_home="$ANDROID_HOME/ndk/29.0.14206865"
          echo "NDK_HOME=$ndk_home" >> "$GITHUB_ENV"
          echo "NDK_ROOT=$ndk_home" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ndk_home" >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop web assets
        run: pnpm --filter @vocaport/desktop-mobile build

      - name: Initialize Android project
        run: pnpm --filter @vocaport/desktop-mobile run android:init

      - name: Build universal Android beta APK
        run: pnpm --filter @vocaport/desktop-mobile exec tauri android build --apk

      - name: Prepare Android release asset
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: >
          node scripts/prepare-release-assets.mjs
          --profile android
          --architecture universal
          --release-tag "$RELEASE_TAG"
          --search-root apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk
          --output-dir "$RUNNER_TEMP/release-assets"

      - name: Upload prepared Android release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-android-universal
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error

  build-desktop:
    needs: prepare-release
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runs_on: ubuntu-22.04
            profile: linux
            architecture: x64
            bundles: appimage,deb
            target: ""
            search_root: target/release/bundle
            artifact_name: release-assets-linux-x64
          - id: windows-x64
            runs_on: windows-latest
            profile: windows
            architecture: x64
            bundles: msi,nsis
            target: ""
            search_root: target/release/bundle
            artifact_name: release-assets-windows-x64
          - id: macos-intel
            runs_on: macos-15-intel
            profile: macos
            architecture: intel
            bundles: dmg
            target: x86_64-apple-darwin
            search_root: target/x86_64-apple-darwin/release/bundle
            artifact_name: release-assets-macos-intel
          - id: macos-arm64
            runs_on: macos-15
            profile: macos
            architecture: arm64
            bundles: dmg
            target: aarch64-apple-darwin
            search_root: target/aarch64-apple-darwin/release/bundle
            artifact_name: release-assets-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: ${{ startsWith(matrix.runs_on, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install extra Rust target
        if: ${{ matrix.target != '' }}
        run: rustup target add "${{ matrix.target }}"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop web assets
        run: pnpm --filter @vocaport/desktop-mobile build

      - name: Build desktop bundles
        shell: bash
        run: |
          args=(
            build
            --ci
            --bundles "${{ matrix.bundles }}"
          )

          if [ -n "${{ matrix.target }}" ]; then
            args+=(--target "${{ matrix.target }}" --no-sign)
          fi

          pnpm --filter @vocaport/desktop-mobile exec tauri "${args[@]}"

      - name: Prepare desktop release assets
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: >
          node scripts/prepare-release-assets.mjs
          --profile "${{ matrix.profile }}"
          --architecture "${{ matrix.architecture }}"
          --release-tag "$RELEASE_TAG"
          --search-root "${{ matrix.search_root }}"
          --output-dir "$RUNNER_TEMP/release-assets"

      - name: Upload prepared desktop release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error

  publish-release-assets:
    needs:
      - prepare-release
      - build-android
      - build-desktop
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: ${{ runner.temp }}/release-assets

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          mapfile -t asset_paths < <(find "$RUNNER_TEMP/release-assets" -maxdepth 1 -type f | sort)

          if [ "${#asset_paths[@]}" -eq 0 ]; then
            echo "No release assets were prepared." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" \
            "${asset_paths[@]}" \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

  trigger-downloads-deploy:
    if: ${{ !github.event.repository.private }}
    needs: publish-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages deploy on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run deploy-downloads-site.yml
          --ref "${{ github.event.repository.default_branch }}"
          --repo "$GITHUB_REPOSITORY"
