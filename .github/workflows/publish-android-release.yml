name: publish-android-release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to receive the Android Beta APK
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  build-android:
    outputs:
      release_tag: ${{ steps.resolve-release-tag.outputs.value }}
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve-release-tag
        env:
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          release_tag="${INPUT_RELEASE_TAG:-$EVENT_RELEASE_TAG}"
          if [ -z "$release_tag" ]; then
            echo "Missing release tag." >&2
            exit 1
          fi
          echo "value=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub CLI is available
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi

      - name: Validate release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve-release-tag.outputs.value }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android command-line tools
        run: |
          brew install --cask android-commandlinetools
          brew_prefix="$(brew --prefix)"
          echo "$brew_prefix/share/android-commandlinetools/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          mkdir -p "$ANDROID_HOME"
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "cmdline-tools;latest" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "ndk;29.0.14206865"
          ndk_home="$ANDROID_HOME/ndk/29.0.14206865"
          echo "NDK_HOME=$ndk_home" >> "$GITHUB_ENV"
          echo "NDK_ROOT=$ndk_home" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ndk_home" >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop web assets
        run: pnpm --filter @vocaport/desktop-mobile build

      - name: Initialize Android project
        run: pnpm --filter @vocaport/desktop-mobile run android:init

      - name: Build universal Android beta APK
        run: pnpm --filter @vocaport/desktop-mobile exec tauri android build --apk

      - name: Prepare Android beta release asset
        id: prepare-asset
        env:
          RELEASE_TAG: ${{ steps.resolve-release-tag.outputs.value }}
        run: |
          source_path="$(find apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk -name 'app-universal-release*.apk' | head -n 1)"
          if [ ! -f "$source_path" ]; then
            echo "Missing Android beta APK output." >&2
            exit 1
          fi
          asset_dir="$RUNNER_TEMP/release-assets"
          mkdir -p "$asset_dir"
          asset_name="vocaport-${RELEASE_TAG}-android-universal-beta.apk"
          asset_path="$asset_dir/$asset_name"
          cp "$source_path" "$asset_path"
          echo "path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload Beta APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve-release-tag.outputs.value }}
        run: >
          gh release upload "$RELEASE_TAG"
          "${{ steps.prepare-asset.outputs.path }}"
          --clobber
          --repo "$GITHUB_REPOSITORY"

  trigger-downloads-deploy:
    if: ${{ !github.event.repository.private }}
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages deploy on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run deploy-downloads-site.yml
          --ref "${{ github.event.repository.default_branch }}"
          --repo "$GITHUB_REPOSITORY"
