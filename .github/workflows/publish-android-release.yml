name: publish-release-assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to rebuild or publish
        required: true
        type: string

permissions:
  actions: write
  contents: write

jobs:
  prepare-release:
    outputs:
      is_prerelease: ${{ steps.resolve-release.outputs.is_prerelease }}
      release_name: ${{ steps.resolve-release.outputs.release_name }}
      release_tag: ${{ steps.resolve-release.outputs.release_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: resolve-release
        env:
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          release_tag="$INPUT_RELEASE_TAG"
          if [ -z "$release_tag" ] && [ "$EVENT_REF_TYPE" = "tag" ]; then
            release_tag="$EVENT_REF_NAME"
          fi
          if [ -z "$release_tag" ]; then
            echo "Missing release tag." >&2
            exit 1
          fi
          release_name="VocaPort $release_tag"
          if printf '%s' "$release_tag" | grep -Eq -- '-(alpha|beta|rc)([.-][0-9]+)?$|-preview([.-][0-9]+)?$'; then
            is_prerelease="true"
          else
            is_prerelease="false"
          fi
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.resolve-release.outputs.is_prerelease }}
          RELEASE_NAME: ${{ steps.resolve-release.outputs.release_name }}
          RELEASE_TAG: ${{ steps.resolve-release.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          args=(
            release
            create
            "$RELEASE_TAG"
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$RELEASE_NAME"
            --notes "Automated release for $RELEASE_TAG. Release assets will be uploaded after the build jobs finish."
          )

          if [ "$IS_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"

  build-android:
    needs: prepare-release
    runs-on: macos-15
    env:
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          required_vars=(
            ANDROID_RELEASE_KEYSTORE_B64
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEYSTORE_PASSWORD
            ANDROID_RELEASE_KEY_PASSWORD
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required Android signing secret: $var_name" >&2
              exit 1
            fi
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android command-line tools
        run: |
          brew install --cask android-commandlinetools
          brew_prefix="$(brew --prefix)"
          echo "$brew_prefix/share/android-commandlinetools/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          mkdir -p "$ANDROID_HOME"
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "cmdline-tools;latest" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "ndk;29.0.14206865"
          ndk_home="$ANDROID_HOME/ndk/29.0.14206865"
          echo "NDK_HOME=$ndk_home" >> "$GITHUB_ENV"
          echo "NDK_ROOT=$ndk_home" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ndk_home" >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop web assets
        run: pnpm --filter @vocaport/desktop-mobile build

      - name: Initialize Android project
        run: pnpm --filter @vocaport/desktop-mobile run android:init

      - name: Build universal Android beta APK
        run: pnpm --filter @vocaport/desktop-mobile exec tauri android build --apk

      - name: Sign Android release APK
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          unsigned_apk="apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          signed_apk="apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          signing_dir="$RUNNER_TEMP/android-signing"
          keystore_path="$signing_dir/release.keystore"
          build_tools_dir="$ANDROID_HOME/build-tools/35.0.1"
          apksigner_path="$build_tools_dir/apksigner"

          if [ ! -f "$unsigned_apk" ]; then
            echo "Missing unsigned Android release APK: $unsigned_apk" >&2
            exit 1
          fi

          if [ ! -x "$apksigner_path" ]; then
            echo "Missing apksigner at $apksigner_path" >&2
            exit 1
          fi

          mkdir -p "$signing_dir"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_B64" | openssl base64 -d -A > "$keystore_path"
          chmod 600 "$keystore_path"

          "$apksigner_path" sign \
            --ks "$keystore_path" \
            --ks-key-alias "$ANDROID_RELEASE_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_RELEASE_KEY_PASSWORD" \
            --out "$signed_apk" \
            "$unsigned_apk"

          "$apksigner_path" verify --verbose "$signed_apk"

      - name: Prepare Android release asset
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: >
          node scripts/prepare-release-assets.mjs
          --profile android
          --architecture universal
          --release-tag "$RELEASE_TAG"
          --search-root apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk
          --output-dir "$RUNNER_TEMP/release-assets"

      - name: Upload prepared Android release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-android-universal
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error

  build-desktop:
    needs: prepare-release
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runs_on: ubuntu-22.04
            profile: linux
            architecture: x64
            bundles: appimage,deb
            target: ""
            search_root: target/release/bundle
            artifact_name: release-assets-linux-x64
          - id: windows-x64
            runs_on: windows-latest
            profile: windows
            architecture: x64
            bundles: msi,nsis
            target: ""
            search_root: target/release/bundle
            artifact_name: release-assets-windows-x64
          - id: macos-intel
            runs_on: macos-15-intel
            profile: macos
            architecture: intel
            bundles: dmg
            target: x86_64-apple-darwin
            search_root: target/x86_64-apple-darwin/release/bundle
            artifact_name: release-assets-macos-intel
          - id: macos-arm64
            runs_on: macos-15
            profile: macos
            architecture: arm64
            bundles: dmg
            target: aarch64-apple-darwin
            search_root: target/aarch64-apple-darwin/release/bundle
            artifact_name: release-assets-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: ${{ startsWith(matrix.runs_on, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install extra Rust target
        if: ${{ matrix.target != '' }}
        run: rustup target add "${{ matrix.target }}"

      - name: Validate macOS signing secrets
        if: ${{ startsWith(matrix.runs_on, 'macos-') }}
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          required_signing_vars=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
          )

          for var_name in "${required_signing_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required macOS signing secret: $var_name" >&2
              exit 1
            fi
          done

          api_vars=(
            APPLE_API_KEY
            APPLE_API_ISSUER
            APPLE_API_KEY_B64
          )
          apple_id_vars=(
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
          )

          api_present=0
          api_missing=()
          for var_name in "${api_vars[@]}"; do
            if [ -n "${!var_name}" ]; then
              api_present=$((api_present + 1))
            else
              api_missing+=("$var_name")
            fi
          done

          apple_id_present=0
          apple_id_missing=()
          for var_name in "${apple_id_vars[@]}"; do
            if [ -n "${!var_name}" ]; then
              apple_id_present=$((apple_id_present + 1))
            else
              apple_id_missing+=("$var_name")
            fi
          done

          if [ "$api_present" -gt 0 ] && [ "${#api_missing[@]}" -gt 0 ]; then
            echo "Incomplete App Store Connect notarization configuration. Missing: ${api_missing[*]}" >&2
            exit 1
          fi

          if [ "$apple_id_present" -gt 0 ] && [ "${#apple_id_missing[@]}" -gt 0 ]; then
            echo "Incomplete Apple ID notarization configuration. Missing: ${apple_id_missing[*]}" >&2
            exit 1
          fi

          if [ "$api_present" -eq 0 ] && [ "$apple_id_present" -eq 0 ]; then
            echo "Missing notarization secrets. Configure either APPLE_API_KEY/APPLE_API_ISSUER/APPLE_API_KEY_B64 or APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID." >&2
            exit 1
          fi

      - name: Import Apple signing certificate
        if: ${{ startsWith(matrix.runs_on, 'macos-') }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          signing_dir="$RUNNER_TEMP/apple-signing"
          certificate_path="$signing_dir/certificate.p12"
          keychain_path="$signing_dir/build.keychain"
          keychain_password="$(openssl rand -base64 24)"

          mkdir -p "$signing_dir"
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          cert_info="$(security find-identity -v -p codesigning "$keychain_path" | grep 'Developer ID Application' | head -n 1 || true)"
          if [ -z "$cert_info" ]; then
            security find-identity -v -p codesigning "$keychain_path"
            echo "Missing Developer ID Application certificate." >&2
            exit 1
          fi

          cert_id="$(printf '%s\n' "$cert_info" | awk -F'\"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"

          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_B64" ]; then
            api_key_dir="$signing_dir/private_keys"
            api_key_path="$api_key_dir/AuthKey_${APPLE_API_KEY}.p8"

            mkdir -p "$api_key_dir"
            printf '%s' "$APPLE_API_KEY_B64" | openssl base64 -d -A > "$api_key_path"
            chmod 600 "$api_key_path"

            echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
          fi

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop web assets
        run: pnpm --filter @vocaport/desktop-mobile build

      - name: Build desktop bundles
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          args=(
            build
            --ci
            --bundles "${{ matrix.bundles }}"
          )

          if [ -n "${{ matrix.target }}" ]; then
            args+=(--target "${{ matrix.target }}")
          fi

          pnpm --filter @vocaport/desktop-mobile exec tauri "${args[@]}"

      - name: Verify macOS bundle signature and notarization
        if: ${{ startsWith(matrix.runs_on, 'macos-') }}
        shell: bash
        run: |
          search_root="${{ matrix.search_root }}"
          app_path="$(find "$search_root" -type d -name 'VocaPort.app' | head -n 1)"
          dmg_path="$(find "$search_root" -type f -name '*.dmg' | head -n 1)"

          if [ -z "$app_path" ] || [ -z "$dmg_path" ]; then
            echo "Missing macOS bundle outputs under $search_root." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          spctl --assess --type open --verbose=4 "$dmg_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"

      - name: Prepare desktop release assets
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: >
          node scripts/prepare-release-assets.mjs
          --profile "${{ matrix.profile }}"
          --architecture "${{ matrix.architecture }}"
          --release-tag "$RELEASE_TAG"
          --search-root "${{ matrix.search_root }}"
          --output-dir "$RUNNER_TEMP/release-assets"

      - name: Upload prepared desktop release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error

  publish-release-assets:
    needs:
      - prepare-release
      - build-android
      - build-desktop
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: ${{ runner.temp }}/release-assets

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          mapfile -t asset_paths < <(find "$RUNNER_TEMP/release-assets" -maxdepth 1 -type f | sort)

          if [ "${#asset_paths[@]}" -eq 0 ]; then
            echo "No release assets were prepared." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" \
            "${asset_paths[@]}" \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

  trigger-downloads-deploy:
    if: ${{ !github.event.repository.private }}
    needs: publish-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages deploy on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run deploy-downloads-site.yml
          --ref "${{ github.event.repository.default_branch }}"
          --repo "$GITHUB_REPOSITORY"
