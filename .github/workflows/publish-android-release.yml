name: publish-release-assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to rebuild or publish
        required: true
        type: string

permissions:
  actions: write
  contents: write

jobs:
  prepare-release:
    outputs:
      is_prerelease: ${{ steps.resolve-release.outputs.is_prerelease }}
      release_name: ${{ steps.resolve-release.outputs.release_name }}
      release_tag: ${{ steps.resolve-release.outputs.release_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: resolve-release
        env:
          EVENT_REF_NAME: ${{ github.ref_name }}
          EVENT_REF_TYPE: ${{ github.ref_type }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          release_tag="$INPUT_RELEASE_TAG"
          if [ -z "$release_tag" ] && [ "$EVENT_REF_TYPE" = "tag" ]; then
            release_tag="$EVENT_REF_NAME"
          fi
          if [ -z "$release_tag" ]; then
            echo "Missing release tag." >&2
            exit 1
          fi
          release_name="VocaPort $release_tag"
          if printf '%s' "$release_tag" | grep -Eq -- '-(alpha|beta|rc)([.-][0-9]+)?$|-preview([.-][0-9]+)?$'; then
            is_prerelease="true"
          else
            is_prerelease="false"
          fi
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.resolve-release.outputs.is_prerelease }}
          RELEASE_NAME: ${{ steps.resolve-release.outputs.release_name }}
          RELEASE_TAG: ${{ steps.resolve-release.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          args=(
            release
            create
            "$RELEASE_TAG"
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$RELEASE_NAME"
            --notes "Automated release for $RELEASE_TAG. Release assets will be uploaded after the build jobs finish."
          )

          if [ "$IS_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"

  build-android:
    needs: prepare-release
    runs-on: macos-15
    env:
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          required_vars=(
            ANDROID_RELEASE_KEYSTORE_B64
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEYSTORE_PASSWORD
            ANDROID_RELEASE_KEY_PASSWORD
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required Android signing secret: $var_name" >&2
              exit 1
            fi
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android command-line tools
        run: |
          brew install --cask android-commandlinetools
          brew_prefix="$(brew --prefix)"
          echo "$brew_prefix/share/android-commandlinetools/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          mkdir -p "$ANDROID_HOME"
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "cmdline-tools;latest" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "ndk;29.0.14206865"
          ndk_home="$ANDROID_HOME/ndk/29.0.14206865"
          echo "NDK_HOME=$ndk_home" >> "$GITHUB_ENV"
          echo "NDK_ROOT=$ndk_home" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ndk_home" >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop web assets
        run: pnpm --filter @vocaport/desktop-mobile build

      - name: Initialize Android project
        run: pnpm --filter @vocaport/desktop-mobile run android:init

      - name: Build universal Android beta APK
        run: pnpm --filter @vocaport/desktop-mobile exec tauri android build --apk

      - name: Sign Android release APK
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          unsigned_apk="apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          signed_apk="apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          signing_dir="$RUNNER_TEMP/android-signing"
          keystore_path="$signing_dir/release.keystore"
          build_tools_dir="$ANDROID_HOME/build-tools/35.0.1"
          apksigner_path="$build_tools_dir/apksigner"

          if [ ! -f "$unsigned_apk" ]; then
            echo "Missing unsigned Android release APK: $unsigned_apk" >&2
            exit 1
          fi

          if [ ! -x "$apksigner_path" ]; then
            echo "Missing apksigner at $apksigner_path" >&2
            exit 1
          fi

          mkdir -p "$signing_dir"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_B64" | openssl base64 -d -A > "$keystore_path"
          chmod 600 "$keystore_path"

          "$apksigner_path" sign \
            --ks "$keystore_path" \
            --ks-key-alias "$ANDROID_RELEASE_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_RELEASE_KEY_PASSWORD" \
            --out "$signed_apk" \
            "$unsigned_apk"

          "$apksigner_path" verify --verbose "$signed_apk"

      - name: Prepare Android release asset
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: >
          node scripts/prepare-release-assets.mjs
          --profile android
          --architecture universal
          --release-tag "$RELEASE_TAG"
          --search-root apps/desktop-mobile/src-tauri/gen/android/app/build/outputs/apk
          --output-dir "$RUNNER_TEMP/release-assets"

      - name: Upload prepared Android release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-android-universal
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error

  build-desktop:
    needs: prepare-release
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runs_on: ubuntu-22.04
            profile: linux
            architecture: x64
            bundles: appimage,deb
            target: ""
            search_root: target/release/bundle
            artifact_name: release-assets-linux-x64
          - id: windows-x64
            runs_on: windows-latest
            profile: windows
            architecture: x64
            bundles: msi,nsis
            target: ""
            search_root: target/release/bundle
            artifact_name: release-assets-windows-x64
          - id: macos-intel
            runs_on: macos-15-intel
            profile: macos
            architecture: intel
            bundles: dmg
            target: x86_64-apple-darwin
            search_root: target/x86_64-apple-darwin/release/bundle
            artifact_name: release-assets-macos-intel
          - id: macos-arm64
            runs_on: macos-15
            profile: macos
            architecture: arm64
            bundles: dmg
            target: aarch64-apple-darwin
            search_root: target/aarch64-apple-darwin/release/bundle
            artifact_name: release-assets-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: ${{ startsWith(matrix.runs_on, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install extra Rust target
        if: ${{ matrix.target != '' }}
        run: rustup target add "${{ matrix.target }}"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop web assets
        run: pnpm --filter @vocaport/desktop-mobile build

      - name: Build desktop bundles
        shell: bash
        run: |
          args=(
            build
            --ci
            --bundles "${{ matrix.bundles }}"
          )

          if [ "${{ matrix.profile }}" = "macos" ]; then
            export APPLE_SIGNING_IDENTITY="-"
          fi

          if [ -n "${{ matrix.target }}" ]; then
            args+=(--target "${{ matrix.target }}")
          fi

          pnpm --filter @vocaport/desktop-mobile exec tauri "${args[@]}"

      - name: Verify macOS app bundle signature
        if: ${{ matrix.profile == 'macos' }}
        shell: bash
        run: |
          search_root="${{ matrix.search_root }}"
          dmg_path="$(find "$search_root" -type f -name '*.dmg' | head -n 1)"
          mount_dir="$(mktemp -d)"
          mounted_device=""

          cleanup() {
            if [ -n "$mounted_device" ]; then
              hdiutil detach "$mounted_device" -quiet || true
            fi
            rm -rf "$mount_dir"
          }

          trap cleanup EXIT

          if [ -z "$dmg_path" ]; then
            echo "Missing macOS DMG under $search_root." >&2
            exit 1
          fi

          attach_output="$(hdiutil attach "$dmg_path" -mountpoint "$mount_dir" -nobrowse -readonly)"
          mounted_device="$(printf '%s\n' "$attach_output" | awk '/^\/dev\// { print $1; exit }')"
          app_path="$(find "$mount_dir" -maxdepth 2 -type d -name 'VocaPort.app' | head -n 1)"

          if [ -z "$app_path" ]; then
            echo "Missing macOS app bundle inside $dmg_path." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "$app_path"
          codesign -dv --verbose=4 "$app_path" 2>&1 | grep -q "Signature=adhoc"

      - name: Verify Windows installers and first launch
        if: ${{ matrix.profile == 'windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Resolve-AppPath {
            param([string[]]$SearchRoots)

            $candidateNames = @('VocaPort.exe', 'vocaport_native_shell.exe', 'voca-port.exe')

            foreach ($root in $SearchRoots) {
              if (-not $root -or -not (Test-Path $root)) {
                continue
              }

              foreach ($candidateName in $candidateNames) {
                $candidatePath = Join-Path $root $candidateName
                if (Test-Path $candidatePath) {
                  return $candidatePath
                }
              }

              $foundPath = Get-ChildItem -Path $root -Recurse -Include $candidateNames -File -ErrorAction SilentlyContinue |
                Select-Object -First 1 -ExpandProperty FullName

              if ($foundPath) {
                return $foundPath
              }
            }

            return $null
          }

          function Assert-AppLaunch {
            param([string]$AppPath)

            if (-not $AppPath -or -not (Test-Path $AppPath)) {
              throw "Missing app binary: $AppPath"
            }

            $process = Start-Process -FilePath $AppPath -PassThru
            Start-Sleep -Seconds 8

            if ($process.HasExited) {
              throw "App exited too early with code $($process.ExitCode): $AppPath"
            }

            taskkill.exe /PID $process.Id /T /F | Out-Null
            Wait-Process -Id $process.Id -Timeout 15 -ErrorAction SilentlyContinue
          }

          function Remove-InstallRoot {
            param([string]$InstallRoot)

            foreach ($attempt in 1..5) {
              if (-not (Test-Path $InstallRoot)) {
                return
              }

              try {
                Remove-Item $InstallRoot -Recurse -Force
                return
              } catch {
                if ($attempt -eq 5) {
                  Write-Warning "Unable to remove $InstallRoot after first-launch smoke. Continuing because package validation already passed. $($_.Exception.Message)"
                  return
                }

                Start-Sleep -Seconds 2
              }
            }
          }

          $searchRoot = "${{ matrix.search_root }}"
          $msiPath = (Get-ChildItem -Path $searchRoot -Recurse -Filter *.msi | Select-Object -First 1).FullName
          $setupPath = (Get-ChildItem -Path $searchRoot -Recurse -Filter *setup.exe | Select-Object -First 1).FullName

          if (-not $msiPath -or -not $setupPath) {
            throw "Missing Windows installers under $searchRoot"
          }

          Write-Host "MSI Authenticode information:"
          Get-AuthenticodeSignature $msiPath | Format-List Status, StatusMessage, SignerCertificate
          Write-Host "NSIS Authenticode information:"
          Get-AuthenticodeSignature $setupPath | Format-List Status, StatusMessage, SignerCertificate

          $msiInstallRoot = Join-Path $env:ProgramFiles 'VocaPort'
          Start-Process -FilePath msiexec.exe -Wait -NoNewWindow -ArgumentList @('/i', $msiPath, '/qn', '/norestart')
          $msiAppPath = Resolve-AppPath @(
            $msiInstallRoot,
            (Join-Path $env:ProgramFiles 'VocaPort'),
            (Join-Path $env:LOCALAPPDATA 'Programs'),
            $env:ProgramFiles
          )
          Assert-AppLaunch $msiAppPath

          $nsisInstallRoot = Join-Path $env:RUNNER_TEMP 'vocaport-nsis'
          if (Test-Path $nsisInstallRoot) {
            Remove-Item $nsisInstallRoot -Recurse -Force
          }

          Start-Process -FilePath $setupPath -Wait -NoNewWindow -ArgumentList @('/S', "/D=$nsisInstallRoot")
          $nsisAppPath = Resolve-AppPath @($nsisInstallRoot)
          Assert-AppLaunch $nsisAppPath
          Remove-InstallRoot $nsisInstallRoot

      - name: Verify Linux packages and first launch
        if: ${{ matrix.profile == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail

          assert_starts() {
            local log_path="$1"
            shift

            "$@" >"$log_path" 2>&1 &
            local app_pid=$!
            sleep 10

            if ! kill -0 "$app_pid" 2>/dev/null; then
              cat "$log_path"
              wait "$app_pid" || true
              echo "Application exited before the smoke window finished: $*" >&2
              return 1
            fi

            kill "$app_pid" 2>/dev/null || true
            wait "$app_pid" 2>/dev/null || true
          }

          search_root="${{ matrix.search_root }}"
          appimage_path="$(find "$search_root" -type f \( -iname '*.appimage' -o -iname '*.AppImage' \) | head -n 1)"
          deb_path="$(find "$search_root" -type f -iname '*.deb' | head -n 1)"

          if [ -z "$appimage_path" ] || [ -z "$deb_path" ]; then
            echo "Missing Linux desktop bundles under $search_root." >&2
            exit 1
          fi

          chmod +x "$appimage_path"
          assert_starts "$RUNNER_TEMP/vocaport-appimage.log" xvfb-run -a "$appimage_path" --appimage-extract-and-run

          package_name="$(dpkg-deb -f "$deb_path" Package)"
          sudo dpkg -i "$deb_path" || sudo apt-get install -f -y
          installed_binary="$(dpkg -L "$package_name" | while read -r candidate; do
            if [ -f "$candidate" ] && [ -x "$candidate" ]; then
              case "$candidate" in
                *.so|*.desktop) continue ;;
              esac
              echo "$candidate"
              break
            fi
          done)"

          if [ -z "$installed_binary" ]; then
            echo "Unable to resolve installed Linux desktop binary from package $package_name." >&2
            exit 1
          fi

          assert_starts "$RUNNER_TEMP/vocaport-deb.log" xvfb-run -a "$installed_binary"
          sudo apt-get remove -y "$package_name" || true

      - name: Prepare desktop release assets
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: >
          node scripts/prepare-release-assets.mjs
          --profile "${{ matrix.profile }}"
          --architecture "${{ matrix.architecture }}"
          --release-tag "$RELEASE_TAG"
          --search-root "${{ matrix.search_root }}"
          --output-dir "$RUNNER_TEMP/release-assets"

      - name: Upload prepared desktop release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/release-assets
          if-no-files-found: error

  publish-release-assets:
    needs:
      - prepare-release
      - build-android
      - build-desktop
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: ${{ runner.temp }}/release-assets

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          mapfile -t asset_paths < <(find "$RUNNER_TEMP/release-assets" -maxdepth 1 -type f | sort)

          if [ "${#asset_paths[@]}" -eq 0 ]; then
            echo "No release assets were prepared." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" \
            "${asset_paths[@]}" \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

  trigger-downloads-deploy:
    if: ${{ !github.event.repository.private }}
    needs: publish-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages deploy on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run deploy-downloads-site.yml
          --ref "${{ github.event.repository.default_branch }}"
          --repo "$GITHUB_REPOSITORY"
