name: deploy-downloads-site

on:
  push:
    branches:
      - main
    paths:
      - "apps/downloads/**"
      - "scripts/build-releases-manifest.mjs"
      - "scripts/release-manifest.mjs"
      - "scripts/release-manifest.d.mts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-downloads-site.yml"
      - ".github/workflows/publish-android-release.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pages-unavailable:
    if: ${{ github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why GitHub Pages is skipped
        run: >
          echo "GitHub Pages deployment is skipped because this repository is private and the current plan does not support Pages for it."

  build-site:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build public release catalog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          node scripts/build-releases-manifest.mjs
          --owner "${{ github.repository_owner }}"
          --repo "${{ github.event.repository.name }}"
          --output apps/downloads/public/releases.json

      - name: Build downloads site
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter @vocaport/downloads build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/downloads/dist

  deploy-site:
    if: ${{ !github.event.repository.private }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build-site
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
